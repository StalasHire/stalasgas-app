<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stala'sGas Orders</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header">
    <img src="StalasGas_Logo.png" alt="Stala'sGas Logo" class="logo">
    <p>Cook Smart Use Gas.</p>
</div>
</header>
  <div class="container">

    <div class="header">
  
    </div>

    <div class="form-card">

        <h2>Place Order Here </h2>

        <!-- all your inputs -->

  
  

    </div>

</div>
<input
    type="text"
    id="name"
    placeholder="Customer Name"
    required
/>

<input
    type="tel"
    id="phone"
    placeholder="Contact Number"
    required
/>
<input
  type="text"
  id="address"
  placeholder="Delivery Address"
  required
/>
<input
  type="text"
  id="area"
  placeholder="Area / Suburb"
  required
/>

<select id="product">
<option value="5kg">5kg - R250</option>
<option value="7kg">7kg - R325</option>
<option value="9kg">9kg - R380</option>
<option value="14kg">14kg - R580</option>
<option value="19kg">19kg - R750</option>
<option value="48kg">48kg - R1600</option>
</select>
  <select id="payment">
    <option value="">Payment Method</option>
    <option value="Cash">Cash</option>
    <option value="EFT">EFT</option>
  </select>
<input id="quantity" type="number" value="1">
<button onclick="submitOrder()">Submit Order</button>
<div id="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
</body>
</html>
